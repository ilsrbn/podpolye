<div class="marquee-wrap">
  <div class="marquee-inner">
    @for (copy of copies; track copy) {
      <div class="marquee-group" [attr.aria-hidden]="copy === 1">
        @for (item of items; track item) {
          <span>{{ item }}</span><span class="accent">///</span>
        }
      </div>
    }
  </div>
</div>
